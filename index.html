<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hex Domain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="sidebar-toggle" aria-label="Menu">☰</button>
  <div id="sidebar-backdrop"></div>

  <div id="game-container">
    <canvas id="map-canvas"></canvas>

    <aside id="sidebar">
      <h1 class="game-title">Hex Domain</h1>

      <section class="panel">
        <h2>Popolazione</h2>
        <div class="stat-row">
          <span>Totale</span><strong id="pop-total">1</strong>
        </div>
        <div class="stat-row">
          <span>Idle</span><strong id="workers-idle">1</strong>
        </div>
        <div class="stat-row">
          <span>Occupati</span><strong id="workers-busy">0</strong>
        </div>
      </section>

      <section class="panel">
        <h2>Risorse</h2>
        <div id="resource-list"></div>
      </section>

      <section class="panel ach-panel">
        <h2>Traguardi <span class="xp-level-badge" id="xp-level">Lv 1</span></h2>
        <div id="bonus-bar"></div>
        <div id="achievement-list"></div>
      </section>

      <section class="panel">
        <button id="reset-btn" class="danger-btn">↺ Nuova partita</button>
      </section>
    </aside>
  </div>

  <!-- Sun / day widget -->
  <div id="sun-widget" aria-label="Avanzamento del giorno"></div>

  <div id="toast"></div>

  <!-- Hex action modal -->
  <div id="hex-modal" class="modal-overlay hidden">
    <div class="modal-box hex-modal-box">
      <div class="modal-header">
        <span class="modal-title" id="hex-modal-title">Esagono</span>
        <button id="hex-modal-close-btn" class="modal-close">✕</button>
      </div>
      <div id="hex-modal-content" class="modal-content hex-modal-content"></div>
    </div>
  </div>

  <!-- Build modal -->
  <div id="build-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">🏗 Costruisci</span>
        <button id="build-modal-close-btn" class="modal-close">✕</button>
      </div>
      <div id="build-modal-content" class="modal-content build-modal-grid"></div>
    </div>
  </div>

  <!-- Craft modal -->
  <div id="craft-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="craft-modal-title">🔨 Ricette</span>
        <button id="craft-modal-close-btn" class="modal-close">✕</button>
      </div>
      <div id="craft-modal-content" class="modal-content"></div>
    </div>
  </div>

  <!-- Research modal -->
  <div id="research-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">🔬 Albero della Ricerca</span>
        <button id="modal-close-btn" class="modal-close">✕</button>
      </div>
      <div id="research-modal-content" class="modal-content"></div>
    </div>
  </div>
  <!-- Level-up modal (no close button — player must choose a bonus) -->
  <div id="levelup-modal" class="modal-overlay hidden">
    <div class="modal-box levelup-modal-box">
      <div class="modal-header levelup-header">
        <span class="modal-title">⬆ Livello <span id="levelup-num">2</span> raggiunto!</span>
      </div>
      <p class="levelup-subtitle">Scegli un potenziamento:</p>
      <div id="levelup-modal-content" class="levelup-modal-content"></div>
    </div>
  </div>

  <!-- Allow game loop to run in background tabs (setTimeout fires even when hidden) -->
  <script>
    (function() {
      var _raf = window.requestAnimationFrame.bind(window);
      window.requestAnimationFrame = function(cb) {
        if (document.hidden) return setTimeout(function() { cb(performance.now()); }, 50);
        return _raf(cb);
      };
    })();
  </script>
  <script>
    (function () {
      const s = document.createElement('script');
      s.type = 'module';
      s.src  = 'js/main.js?v=' + Date.now();
      document.currentScript.insertAdjacentElement('afterend', s);
    })();
  </script>
</body>
</html>
